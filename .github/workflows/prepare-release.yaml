name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Semver-style tag for release (e.g., v1.0.0)
        required: true

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  UV_FROZEN: 1

jobs:
  create-pr:
    name: Create PR
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check tag format
        run: |
          if [[ ! "${{ inputs.tag }}" =~ ^v ]]; then
            echo "Tag must start with 'v'"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: latest
          enable-cache: true

      - name: Set version
        env:
          UV_FROZEN: 0 # Allow updating lockfile
        run: |
          tag="${{ inputs.tag }}"
          tag_no_v="${tag#v}"
          uv version "${tag#v}"

      - name: Generate GitHub App token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: generate-token
        with:
          app-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.generate-token.outputs.token }}
          sign-commits: true
          title: Release ${{ inputs.tag }}
          body: |
            This pull request prepares the repository for the ${{ inputs.tag }} release.

            ### Changes
            - Bumps package version to `${{ inputs.tag }}` (without creating a git tag)
            - Ready for review and merge

            ### Next steps
            1. Review and merge this PR
            2. Create and publish a GitHub release with tag `${{ inputs.tag }}`
            3. The release workflow will automatically build and publish the package to PyPI
          branch: release/${{ inputs.tag }}
          delete-branch: true
